<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar ROI & NPV Analyzer</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f4f6f8;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    font-size:24px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#eef7ff;
    border-radius:8px;
    font-size:17px;
}
</style>

</head>

<body>

<div class="container">

<h1>Solar ROI & NPV Analyzer</h1>

<label>Solar System Size (kW)</label>
<input id="kw" type="number" value="10">

<label>Installation Cost ($)</label>
<input id="cost" type="number" value="10000">

<label>Monthly Saving ($)</label>
<input id="saving" type="number" value="150">

<label>Project Life (Years)</label>
<input id="years" type="number" value="25">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result">
Result will show here
</div>

</div>


<script>

function calculate(){

let cost = Number(document.getElementById("cost").value);
let saving = Number(document.getElementById("saving").value);
let years = Number(document.getElementById("years").value);

let annual = saving * 12;
let total = annual * years;

let roi = ((total - cost) / cost) * 100;

document.getElementById("result").innerHTML =
`
<b>Total Saving:</b> $${total.toFixed(2)} <br>
<b>ROI:</b> ${roi.toFixed(2)} %
`;

}

</script>

</body>
</html>
